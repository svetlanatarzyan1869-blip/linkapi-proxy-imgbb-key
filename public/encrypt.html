<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шифратор ключей для Tavo Proxy</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #f5f5f7; }
        .container { background: white; border-radius: 1rem; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 1rem; font-weight: 600; }
        input, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 0.5rem; }
        button { margin-top: 1.5rem; padding: 0.75rem 1.5rem; background: #0070f3; color: white; border: none; border-radius: 0.5rem; cursor: pointer; }
        .result { margin-top: 1.5rem; background: #f0f0f0; padding: 1rem; border-radius: 0.5rem; word-break: break-all; }
        .error { color: red; margin-top: 0.5rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 Шифратор API-ключей</h1>
    <p>Введите свои <strong>API_KEY и IMGBB_KEY</strong>. Мастер-ключ уже встроен.</p>

    <label>🔑 API_KEY (LinkAPI)</label>
    <input type="text" id="apiKey" placeholder="sk-...">

    <label>🖼️ IMGBB_KEY (обязательно)</label>
    <input type="text" id="imgbbKey" placeholder="ваш_ключ_ImgBB">

    <button id="encryptBtn">Зашифровать → получить data</button>

    <div id="result" class="result" style="display:none;">
        <strong>Ваша строка data (скопируйте):</strong><br>
        <span id="encryptedData"></span>
        <button id="copyBtn" style="margin-top:0.5rem; background:#28a745;">Копировать</button>
    </div>
    <div id="error" class="error"></div>
</div>

<script>
    // Мастер-ключ (ENCRYPTION_KEY из Vercel)
    const MASTER_KEY = 'DNuPiIbKpNyB8M/h9wZX3I9XqMF0BMORS63wd8RvWKs=';

    async function encryptData(obj, secretKeyBase64) {
        const encoder = new TextEncoder();
        const data = encoder.encode(JSON.stringify(obj));
        const iv = crypto.getRandomValues(new Uint8Array(16));
        const keyBuffer = Uint8Array.from(atob(secretKeyBase64), c => c.charCodeAt(0));
        const cryptoKey = await crypto.subtle.importKey('raw', keyBuffer, 'AES-CBC', false, ['encrypt']);
        const encrypted = await crypto.subtle.encrypt({ name: 'AES-CBC', iv }, cryptoKey, data);
        const ivBase64 = btoa(String.fromCharCode(...iv));
        const encryptedBase64 = btoa(String.fromCharCode(...new Uint8Array(encrypted)));
        return `${ivBase64}:${encryptedBase64}`;
    }

    document.getElementById('encryptBtn').addEventListener('click', async () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        const imgbbKey = document.getElementById('imgbbKey').value.trim();
        const errorDiv = document.getElementById('error');
        const resultDiv = document.getElementById('result');

        errorDiv.innerText = '';
        resultDiv.style.display = 'none';

        if (!apiKey || !imgbbKey) {
            errorDiv.innerText = 'Заполните оба поля.';
            return;
        }

        try {
            const encrypted = await encryptData({ key: apiKey, imgbb_key: imgbbKey }, MASTER_KEY);
            document.getElementById('encryptedData').innerText = encrypted;
            resultDiv.style.display = 'block';
        } catch (err) {
            errorDiv.innerText = 'Ошибка: ' + err.message;
        }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
        const text = document.getElementById('encryptedData').innerText;
        navigator.clipboard.writeText(text).then(() => alert('Скопировано!'));
    });
</script>
</body>
</html>
